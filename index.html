<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra-Realistic 3D Liquid Glass Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1s ease-out;
        }
        .dg.ac {
            z-index: 20 !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/ImprovedNoise.js"></script>
</head>
<body>
    <div id="loading">INITIALIZING NEURAL LIQUID ENGINE...</div>
    <div id="canvas-container"></div>

    <script>
        // ============================================================================
        // CORE ENGINE SETUP & ARCHITECTURE
        // ============================================================================
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.25;
        renderer.physicallyCorrectLights = true;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.enablePan = false;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // ============================================================================
        // HIGH-FIDELITY ENVIRONMENT & LIGHTING
        // ============================================================================
        const environmentGroup = new THREE.Group();
        scene.add(environmentGroup);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        const blueLight = new THREE.PointLight(0x0044ff, 5.0, 20);
        blueLight.position.set(-5, -2, -5);
        scene.add(blueLight);

        const pinkLight = new THREE.PointLight(0xff0088, 5.0, 20);
        pinkLight.position.set(5, 3, -5);
        scene.add(pinkLight);

        // Abstract environment geometry for the glass to refract
        const geoMat1 = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.8 });
        const geoMat2 = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1, metalness: 0.9, emissive: 0x002244, emissiveIntensity: 0.5 });
        
        for(let i=0; i<40; i++) {
            const mesh = new THREE.Mesh(
                Math.random() > 0.5 ? new THREE.BoxGeometry(1, 1, 1) : new THREE.IcosahedronGeometry(0.5, 0),
                Math.random() > 0.5 ? geoMat1 : geoMat2
            );
            mesh.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20 - 10
            );
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            const scale = Math.random() * 2 + 0.5;
            mesh.scale.set(scale, scale, scale);
            environmentGroup.add(mesh);
        }

        // ============================================================================
        // ULTRA-REALISTIC LIQUID GLASS SHADERS
        // ============================================================================
        const liquidGlassVertexShader = `
            #define PHONG

            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec3 vWorldPosition;
            varying vec2 vUv;
            varying vec3 vTang;
            varying vec3 vBitang;

            uniform float uTime;
            uniform float uLiquidSpeed;
            uniform float uDeformation;
            uniform float uDetail;

            // Advanced 4D Simplex Noise for Organic Fluidity
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;

                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );

                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;

                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( 
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

                float n_ = 1.42857142857 - 1.0;
                vec3  ns = n_ * D.wyz - D.xzx;

                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );

                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);

                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );

                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));

                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);

                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;

                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                            dot(p2,x2), dot(p3,x3) ) );
            }

            // Calculate exact normals after displacement for accurate physical lighting
            vec3 orthogonal(vec3 v) {
                return normalize(abs(v.x) > abs(v.z) ? vec3(-v.y, v.x, 0.0) : vec3(0.0, -v.z, v.y));
            }

            void main() {
                vUv = uv;
                
                // Base position
                vec3 pos = position;
                
                // Layered fluid noise
                float noiseVal = snoise(pos * uDetail + uTime * uLiquidSpeed) * uDeformation;
                float noiseVal2 = snoise(pos * (uDetail * 2.5) - uTime * (uLiquidSpeed * 1.5)) * (uDeformation * 0.3);
                
                float totalDisplacement = noiseVal + noiseVal2;
                pos += normal * totalDisplacement;

                // Tangent space for displaced normals
                vec3 tangent = orthogonal(normal);
                vec3 bitangent = normalize(cross(normal, tangent));
                
                float offset = 0.01;
                vec3 neighbour1 = position + tangent * offset;
                vec3 neighbour2 = position + bitangent * offset;

                float n1 = snoise(neighbour1 * uDetail + uTime * uLiquidSpeed) * uDeformation +
                           snoise(neighbour1 * (uDetail * 2.5) - uTime * (uLiquidSpeed * 1.5)) * (uDeformation * 0.3);
                float n2 = snoise(neighbour2 * uDetail + uTime * uLiquidSpeed) * uDeformation +
                           snoise(neighbour2 * (uDetail * 2.5) - uTime * (uLiquidSpeed * 1.5)) * (uDeformation * 0.3);

                neighbour1 += tangent * n1;
                neighbour2 += bitangent * n2;

                vec3 displacedNormal = normalize(cross(neighbour1 - pos, neighbour2 - pos));
                
                vNormal = normalize(normalMatrix * displacedNormal);
                vTang = normalize(normalMatrix * tangent);
                vBitang = normalize(normalMatrix * bitangent);

                vec4 worldPosition = modelMatrix * vec4(pos, 1.0);
                vWorldPosition = worldPosition.xyz;

                vec4 mvPosition = viewMatrix * worldPosition;
                vViewPosition = -mvPosition.xyz;

                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const liquidGlassFragmentShader = `
            #define PHONG
            uniform vec3 diffuse;
            uniform vec3 emissive;
            uniform vec3 specular;
            uniform float shininess;
            uniform float opacity;
            
            uniform sampler2D tBackground;
            uniform vec2 uResolution;
            uniform float uIOR; // Index of Refraction
            uniform float uChromaticAberration;
            uniform float uFresnelPower;
            uniform float uGlassThickness;
            uniform vec3 uColorTint;

            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec3 vWorldPosition;
            varying vec2 vUv;

            // Physical Fresnel approximation
            float fresnel(vec3 viewDir, vec3 normal, float power, float scale, float bias) {
                return bias + scale * pow(1.0 - dot(viewDir, normal), power);
            }

            // Screen-space refraction
            vec3 getRefraction(vec3 viewDir, vec3 normal, float ior, float dispersion, float thickness) {
                vec3 refractedView = refract(-viewDir, normal, 1.0 / ior);
                vec2 uv = gl_FragCoord.xy / uResolution.xy;
                
                // Advanced dispersion (chromatic aberration)
                vec2 offsetR = refractedView.xy * thickness * (1.0 + dispersion);
                vec2 offsetG = refractedView.xy * thickness * 1.0;
                vec2 offsetB = refractedView.xy * thickness * (1.0 - dispersion);

                float r = texture2D(tBackground, uv + offsetR).r;
                float g = texture2D(tBackground, uv + offsetG).g;
                float b = texture2D(tBackground, uv + offsetB).b;

                return vec3(r, g, b);
            }

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);

                // Calculate base refraction
                vec3 refractionColor = getRefraction(viewDir, normal, uIOR, uChromaticAberration, uGlassThickness);
                
                // Apply Tint
                refractionColor *= uColorTint;

                // Fresnel effect for edge reflection simulation
                float f = fresnel(viewDir, normal, uFresnelPower, 1.0, 0.0);
                f = clamp(f, 0.0, 1.0);

                // Combine specular highlights (mocked via fresnel brightened)
                vec3 finalColor = mix(refractionColor, vec3(1.0), f * 0.5);

                // Lighting interactions (Specular)
                vec3 lightDir = normalize(vec3(5.0, 10.0, 7.0));
                vec3 halfVector = normalize(lightDir + viewDir);
                float NdotH = max(0.0, dot(normal, halfVector));
                float specularTerm = pow(NdotH, 150.0) * 1.5;

                finalColor += vec3(1.0) * specularTerm; // Bright white highlights

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // ============================================================================
        // OFF-SCREEN RENDER TARGET (FOR REFRACTION)
        // ============================================================================
        const renderTarget = new THREE.WebGLRenderTarget(
            window.innerWidth * window.devicePixelRatio, 
            window.innerHeight * window.devicePixelRatio, 
            {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.LinearFilter,
                format: THREE.RGBFormat,
                encoding: THREE.sRGBEncoding
            }
        );

        // ============================================================================
        // MATERIAL & MESH INSTANTIATION
        // ============================================================================
        const uniforms = {
            uTime: { value: 0 },
            uLiquidSpeed: { value: 0.35 },
            uDeformation: { value: 0.25 },
            uDetail: { value: 1.2 },
            tBackground: { value: renderTarget.texture },
            uResolution: { value: new THREE.Vector2(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio) },
            uIOR: { value: 1.15 },
            uChromaticAberration: { value: 0.04 },
            uFresnelPower: { value: 3.5 },
            uGlassThickness: { value: 0.15 },
            uColorTint: { value: new THREE.Color(0xf0f5ff) },
            
            // Standard lighting uniforms required by PHONG
            diffuse: { value: new THREE.Color(0xffffff) },
            emissive: { value: new THREE.Color(0x000000) },
            specular: { value: new THREE.Color(0xffffff) },
            shininess: { value: 100.0 },
            opacity: { value: 1.0 }
        };

        const liquidMaterial = new THREE.ShaderMaterial({
            vertexShader: liquidGlassVertexShader,
            fragmentShader: liquidGlassFragmentShader,
            uniforms: THREE.UniformsUtils.merge([
                THREE.UniformsLib['lights'],
                uniforms
            ]),
            lights: true,
            transparent: true
        });

        // Use a highly tessellated geometry for smooth displacement
        const liquidGeometry = new THREE.IcosahedronGeometry(2.5, 64);
        const liquidMesh = new THREE.Mesh(liquidGeometry, liquidMaterial);
        scene.add(liquidMesh);

        // ============================================================================
        // POST-PROCESSING PIPELINE
        // ============================================================================
        const renderScene = new THREE.RenderPass(scene, camera);
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.8,  // strength
            0.4,  // radius
            0.85  // threshold
        );

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ============================================================================
        // GRAPHICAL USER INTERFACE (CONTROLS)
        // ============================================================================
        const gui = new dat.GUI({ width: 320 });
        const params = {
            'Refraction IOR': 1.15,
            'Dispersion (Chromatic)': 0.04,
            'Thickness': 0.15,
            'Liquid Speed': 0.35,
            'Wave Amplitude': 0.25,
            'Wave Detail': 1.2,
            'Fresnel Power': 3.5,
            'Glass Tint': '#f0f5ff',
            'Bloom Strength': 0.8,
            'Environment Speed': 0.5
        };

        const folderOptical = gui.addFolder('Optical Properties (Apple Glass)');
        folderOptical.add(params, 'Refraction IOR', 1.0, 2.5).step(0.01).onChange(v => uniforms.uIOR.value = v);
        folderOptical.add(params, 'Dispersion (Chromatic)', 0.0, 0.2).step(0.001).onChange(v => uniforms.uChromaticAberration.value = v);
        folderOptical.add(params, 'Thickness', 0.0, 1.0).step(0.01).onChange(v => uniforms.uGlassThickness.value = v);
        folderOptical.add(params, 'Fresnel Power', 0.1, 10.0).step(0.1).onChange(v => uniforms.uFresnelPower.value = v);
        folderOptical.addColor(params, 'Glass Tint').onChange(v => uniforms.uColorTint.value.set(v));
        folderOptical.open();

        const folderFluid = gui.addFolder('Fluid Dynamics');
        folderFluid.add(params, 'Liquid Speed', 0.0, 2.0).step(0.01).onChange(v => uniforms.uLiquidSpeed.value = v);
        folderFluid.add(params, 'Wave Amplitude', 0.0, 1.5).step(0.01).onChange(v => uniforms.uDeformation.value = v);
        folderFluid.add(params, 'Wave Detail', 0.1, 5.0).step(0.1).onChange(v => uniforms.uDetail.value = v);
        folderFluid.open();

        const folderPost = gui.addFolder('Post-Processing & Scene');
        folderPost.add(params, 'Bloom Strength', 0.0, 3.0).step(0.1).onChange(v => bloomPass.strength = v);
        folderPost.add(params, 'Environment Speed', 0.0, 5.0).step(0.1);
        
        gui.domElement.style.marginTop = '10px';
        gui.domElement.style.marginRight = '10px';

        // ============================================================================
        // MAIN RENDERING LOOP & LOGIC
        // ============================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Update Shader Uniforms
            uniforms.uTime.value = elapsedTime;

            // Animate Background Environment
            environmentGroup.rotation.y = elapsedTime * 0.1 * params['Environment Speed'];
            environmentGroup.rotation.x = elapsedTime * 0.05 * params['Environment Speed'];
            
            environmentGroup.children.forEach((mesh, index) => {
                mesh.rotation.x += 0.01 * params['Environment Speed'];
                mesh.rotation.y += 0.015 * params['Environment Speed'];
                mesh.position.y += Math.sin(elapsedTime + index) * 0.01 * params['Environment Speed'];
            });

            controls.update();

            // 1. Hide Liquid Mesh to capture the background purely
            liquidMesh.visible = false;
            renderer.setRenderTarget(renderTarget);
            renderer.render(scene, camera);

            // 2. Restore Liquid Mesh and render to screen with post-processing
            liquidMesh.visible = true;
            renderer.setRenderTarget(null);
            composer.render();
        }

        // ============================================================================
        // RESIZE EVENT HANDLER
        // ============================================================================
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const pixelRatio = window.devicePixelRatio;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            composer.setSize(width, height);
            
            renderTarget.setSize(width * pixelRatio, height * pixelRatio);
            uniforms.uResolution.value.set(width * pixelRatio, height * pixelRatio);
        });

        // Hide loading screen
        setTimeout(() => {
            loading.style.opacity = '0';
        }, 1500);

        animate();
    </script>
</body>
</html>
